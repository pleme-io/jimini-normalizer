{{- if .Values.retention.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pleme-lib.fullname" . }}-retention
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: retention
spec:
  schedule: {{ .Values.retention.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            {{- include "pleme-lib.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: retention
        spec:
          restartPolicy: OnFailure
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: retention
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: RUN_MODE
                  value: "retention"
                - name: CONFIG_PATH
                  value: "/etc/jimini-normalizer/config.yaml"
                - name: RUST_LOG
                  value: "info,jimini_normalizer=debug"
                {{- if .Values.otel.enabled }}
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: {{ .Values.otel.endpoint | quote }}
                - name: OTEL_SERVICE_NAME
                  value: "jimini-normalizer-retention"
                {{- end }}
              envFrom:
                {{- toYaml .Values.envFrom | nindent 16 }}
              {{- with .Values.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: config
                  mountPath: /etc/jimini-normalizer
                  readOnly: true
          volumes:
            - name: config
              configMap:
                name: jimini-normalizer-config
{{- end }}
