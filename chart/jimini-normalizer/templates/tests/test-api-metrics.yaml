apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pleme-lib.fullname" . }}-test-api-metrics
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-api-metrics
      image: curlimages/curl:8.5.0
      command:
        - /bin/sh
        - -c
        - |
          echo "=== Testing API metrics endpoint (port 9090) ==="
          METRICS=$(curl -sf --max-time 10 \
            "http://{{ include "pleme-lib.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:9090/metrics")
          if [ $? -ne 0 ]; then
            echo "FAILED: Could not reach metrics endpoint on port 9090"
            exit 1
          fi

          echo "=== Checking for expected metric families ==="
          EXPECTED_METRICS="jimini_http_requests_total jimini_normalizations_total jimini_assessments_stored_total jimini_failed_records_pending jimini_outbox_pending jimini_nats_publish_total jimini_postgres_sink_duration_seconds jimini_worker_messages_total jimini_outbox_processed_total jimini_sink_delivery_total jimini_sweeper_runs_total jimini_dead_letters_total jimini_batch_size jimini_replay_total"

          MISSING=0
          for m in $EXPECTED_METRICS; do
            if echo "$METRICS" | grep -q "^# HELP $m "; then
              echo "  OK: $m"
            else
              echo "  MISSING: $m"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "FAILED: $MISSING expected metrics missing"
            exit 1
          fi

          echo "=== API metrics check PASSED ==="
