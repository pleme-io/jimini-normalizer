apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pleme-lib.fullname" . }}-test-connectivity
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-connectivity
      image: curlimages/curl:8.5.0
      command:
        - /bin/sh
        - -c
        - |
          FAILURES=0

          echo "=== Testing service connectivity ==="

          # API service on port 8080
          echo -n "  API service (8080): "
          if curl -sf --max-time 5 "http://{{ include "pleme-lib.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:8080/health" > /dev/null 2>&1; then
            echo "OK"
          else
            echo "FAIL"
            FAILURES=$((FAILURES + 1))
          fi

          # API metrics on port 9090
          echo -n "  API metrics (9090): "
          if curl -sf --max-time 5 "http://{{ include "pleme-lib.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:9090/health" > /dev/null 2>&1; then
            echo "OK"
          else
            echo "FAIL"
            FAILURES=$((FAILURES + 1))
          fi

          {{- if .Values.worker.enabled }}
          # Worker metrics on port 9090
          echo -n "  Worker metrics (9090): "
          if curl -sf --max-time 5 "http://{{ include "pleme-lib.fullname" . }}-worker.{{ .Release.Namespace }}.svc.cluster.local:9090/health" > /dev/null 2>&1; then
            echo "OK"
          else
            echo "FAIL"
            FAILURES=$((FAILURES + 1))
          fi
          {{- end }}

          if [ $FAILURES -gt 0 ]; then
            echo "=== FAILED: $FAILURES service(s) unreachable ==="
            exit 1
          fi
          echo "=== Connectivity check PASSED ==="
