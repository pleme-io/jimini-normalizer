apiVersion: v1
kind: Pod
metadata:
  name: {{ include "pleme-lib.fullname" . }}-test-api-endpoints
  labels:
    {{- include "pleme-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-api-endpoints
      image: curlimages/curl:8.5.0
      command:
        - /bin/sh
        - -c
        - |
          BASE="http://{{ include "pleme-lib.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:8080"
          FAILURES=0

          echo "=== Testing API endpoints ==="

          # GET /health — must return 200
          echo -n "  GET /health: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/health")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # GET /assessments — must return 200
          echo -n "  GET /assessments: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/assessments")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # GET /failed — must return 200
          echo -n "  GET /failed: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/failed")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # GET /audit/logs — must return 200
          echo -n "  GET /audit/logs: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/audit/logs")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # GET /audit/violations — must return 200
          echo -n "  GET /audit/violations: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/audit/violations")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # GET /admin/config — must return 200
          echo -n "  GET /admin/config: "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/admin/config")
          if [ "$STATUS" = "200" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          # POST /normalize without provider — must return 400 (not 404 or 500)
          echo -n "  POST /normalize (no provider): "
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 -X POST "$BASE/normalize" -H "Content-Type: application/json" -d '{}')
          if [ "$STATUS" = "400" ]; then echo "OK ($STATUS)"; else echo "FAIL ($STATUS)"; FAILURES=$((FAILURES + 1)); fi

          if [ $FAILURES -gt 0 ]; then
            echo "=== FAILED: $FAILURES endpoint(s) returned unexpected status ==="
            exit 1
          fi
          echo "=== API endpoints check PASSED ==="
