apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jimini-normalizer-staging

resources:
  - ../flux/helmrelease.yaml
  - ../flux/kustomization.yaml

labels:
  - pairs:
      environment: staging
      app.kubernetes.io/part-of: jimini-normalizer
    includeSelectors: false
    includeTemplates: true

patches:
  # Override HelmRelease with staging values
  - target:
      kind: HelmRelease
      name: jimini-normalizer
    patch: |
      - op: replace
        path: /metadata/namespace
        value: jimini-normalizer-staging
      - op: add
        path: /spec/valuesFiles
        value:
          - values.yaml
          - staging/values.yaml
      - op: replace
        path: /spec/values/env
        value:
          - name: RUN_MODE
            value: "api"
          - name: CONFIG_PATH
            value: "/etc/jimini-normalizer/config.yaml"
          - name: RUST_LOG
            value: "debug,jimini_normalizer=debug"
          - name: DEPLOYMENT_ENV
            value: "staging"
