server:
  host: "0.0.0.0"
  port: 8080
  metrics_port: 9090
database:
  url: "postgres://jimini:jimini@localhost:5432/jimini"
  max_connections: 5
  min_connections: 1
  connect_timeout_secs: 30
  idle_timeout_secs: 600
nats:
  url: "nats://localhost:4222"
  stream_name: JIMINI_ASSESSMENTS
  error_stream_name: JIMINI_ERRORS
  consumer_name: jimini-normalizer-test
  durable: true
  pull_batch_size: 5
  max_ack_pending: 100
  ack_wait_secs: 30
  max_deliver: 3
worker:
  shutdown_timeout_secs: 10
  max_concurrent: 5
  health_check_interval_secs: 10
batch:
  buffer_size: 50
  cleanup_after_batches: 10
  max_concurrent_emits: 25
retry:
  max_attempts: 3
  base_delay_ms: 100
  max_delay_ms: 5000
retention:
  days: 30
logging:
  level: "debug,jimini_normalizer=debug"
  format: "json"
pii:
  enabled: true
  patient_id_strategy: hash
  raw_input_strategy: hash
  hash_salt: "test-salt-at-least-32-characters-long-for-tests"
  provider_fields:
    provider_a:
      - field: name
        strategy: redact
      - field: dob
        strategy: redact
    provider_b:
      - field: patient_name
        strategy: redact
  internal:
    allow_internal_pii: true
    store_patient_id_plaintext: true
    store_raw_for_replay: true
